services:
  - type: web
    name: finanzas-app-api
    env: python
    region: oregon
    plan: free
    rootDir: finanzas_app/backend
    buildCommand: "./build.sh"
    # Pre-deploy (release): en plan FREE de Web Services Render puede no aplicarlo; Docker usa
    # seed_demo_if_empty en segundo plano en docker-entrypoint. En planes con pre-deploy, útil.
    releaseCommand: "./release.sh"
    # exec + bash -c: asegura expansión de $PORT. 1 worker: menos RAM en plan free.
    # healthCheckPath: endpoint que responde 200 (Render usa esto además del escaneo de puerto).
    healthCheckPath: /api/usuarios/config/
    startCommand: 'bash -c "exec gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --graceful-timeout 30 --access-logfile - --error-logfile -"'
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: finanzas-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "tu-api.onrender.com"
      # Orígenes del navegador que pueden llamar al API (el static site / frontend), NO el hostname del API.
      - key: CORS_ALLOWED_ORIGINS
        value: "https://tu-frontend.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Agregar manualmente en el dashboard de Render:
      # FIREBASE_SERVICE_ACCOUNT_JSON = <contenido del JSON en una línea>

databases:
  - name: finanzas-db
    databaseName: finanzas_db
    user: finanzas_user
    plan: free
