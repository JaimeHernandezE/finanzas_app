name: Export diario a Google Sheets

on:
  schedule:
    # 18:00 UTC ≈ 15:00 Chile (UTC-3). Respaldo pg_dump 30 min después (mismo desfase que antes).
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  export:
    name: Exportar BD a Sheets
    runs-on: ubuntu-latest
    steps:
      # "Re-run failed jobs" reutiliza el workflow del commit original, no el último push.
      # Para probar cambios en este YAML: push a la rama por defecto y "Run workflow" o espera al cron.
      - name: Llamar endpoint de exportación
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
          EXPORT_SECRET_TOKEN: ${{ secrets.EXPORT_SECRET_TOKEN }}
        run: |
          if [ -z "$BACKEND_BASE_URL" ]; then
            echo "::error::Falta secret BACKEND_BASE_URL"
            exit 1
          fi
          if [ -z "$EXPORT_SECRET_TOKEN" ]; then
            echo "::error::Falta secret EXPORT_SECRET_TOKEN"
            exit 1
          fi

          response=$(curl --silent --show-error --fail \
            --max-time 120 \
            -X POST \
            -H "X-Export-Token: $EXPORT_SECRET_TOKEN" \
            "${BACKEND_BASE_URL}/api/export/sheets/")

          echo "Respuesta: $response"

          if ! echo "$response" | python3 -c "import sys, json; d=json.load(sys.stdin); sys.exit(0 if d.get(\"ok\") is True else 1)"; then
            echo "Exportación fallida (respuesta sin ok: true)"
            exit 1
          fi
          echo "Exportación exitosa"
