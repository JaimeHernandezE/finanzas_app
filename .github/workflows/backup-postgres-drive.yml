# Respaldo diario de PostgreSQL a Google Drive (máx. 2 archivos recientes en la carpeta).
#
# Configuración manual (una vez):
# - Google Cloud: OAuth (escritorio o web) + API “Google Drive” + alcance drive; refresh token de tu cuenta Gmail.
# - Drive: carpeta en «Mi unidad» de esa cuenta; GOOGLE_DRIVE_BACKUP_FOLDER_ID = ID de la URL.
# - GitHub → Settings → Secrets → Actions:
#     DATABASE_URL = URL externa de Postgres (Render: External Database URL; alcanzable desde internet).
#     GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN, GOOGLE_DRIVE_OAUTH_CLIENT_ID, GOOGLE_DRIVE_OAUTH_CLIENT_SECRET
#     GOOGLE_DRIVE_BACKUP_FOLDER_ID
#
# Nota: si Postgres solo acepta conexiones desde la red interna de Render, este job fallará;
#       en ese caso usa el respaldo desde la app web o un job en Render.

name: Backup PostgreSQL a Drive

on:
  schedule:
    - cron: '30 11 * * *'
  workflow_dispatch:

jobs:
  backup:
    name: pg_dump y subida a Drive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencias del sistema y Python
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          pip install --quiet google-api-python-client google-auth

      - name: Ejecutar respaldo
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_DRIVE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_ID }}
          GOOGLE_DRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_SECRET }}
          GOOGLE_DRIVE_BACKUP_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_BACKUP_FOLDER_ID }}
        run: python finanzas_app/scripts/backup_pg_to_drive.py
