name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       finanzas_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: finanzas_app/backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: finanzas_app/backend
        env:
          DEBUG: "True"
          SECRET_KEY: clave-de-prueba
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finanzas_test
          FIREBASE_SERVICE_ACCOUNT_JSON: '{}'
        run: pytest --tb=short -q

  deploy:
    name: Deploy a Render
    needs: test
    runs-on: ubuntu-latest
    # Solo en push a main (no en PRs) y solo si los tests pasaron
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger deploy
        run: |
          curl --silent --show-error --fail \
            "${{ secrets.RENDER_DEPLOY_HOOK }}"
