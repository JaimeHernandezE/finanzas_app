services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: finanzas_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d finanzas_db"]
      interval: 2s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=finanzas_db
      - DB_USER=admin
      - DB_PASSWORD=password123

  frontend:
    image: node:20-alpine
    working_dir: /app
    # npm install se ejecuta automáticamente si node_modules no existe o package.json cambió
    command: sh -c "npm install && npm run dev"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules  # volumen separado para no pisar node_modules del host
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  frontend_node_modules:
