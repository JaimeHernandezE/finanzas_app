services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-finanzas_db}
      POSTGRES_USER: ${DB_USER:-finanzas_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Define DB_PASSWORD en .env (copia backend/.env.example)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-finanzas_user} -d ${DB_NAME:-finanzas_db}"]
      interval: 2s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      # Opcional: montar solo la clave de Firebase si está en otro sitio (descomenta y ajusta ruta):
      # - ../firebase-service-account.json:/app/firebase-service-account.json:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:?Define SECRET_KEY en .env}
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-finanzas_db}
      - DB_USER=${DB_USER:-finanzas_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - CORS_ALLOW_ALL_ORIGINS=true
      # Debe coincidir con VITE_ES_DEMO en el frontend si usas login demo. En backend/.env: DEMO=true
      - DEMO=${DEMO:-false}

  # UI React (Vite): abre http://localhost:5173 en el navegador. :8000 es solo la API Django.
  # Si no ves cambios al guardar: recarga forzada (Ctrl+Shift+R); en Windows + Docker suele ayudar CHOKIDAR_USEPOLLING.
  frontend:
    image: node:20-alpine
    working_dir: /app
    # npm install se ejecuta automáticamente si node_modules no existe o package.json cambió
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules  # volumen separado para no pisar node_modules del host
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  frontend_node_modules:
